services:
  db:
    image: mariadb:10.11
    container_name: task_db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: taskdb
      MARIADB_USER: mywebapp
      MARIADB_PASSWORD: mysecretpassword
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app_network

  webapp:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: task_webapp
    restart: unless-stopped
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=taskdb
      - DB_USER=mywebapp
      - DB_PASSWORD=mysecretpassword
    command: >
      sh -c "node dist/migrate.js --db-host=db --db-port=3306 --db-name=taskdb --db-user=mywebapp --db-password=mysecretpassword && 
             node dist/index.js --host=0.0.0.0 --port=8080 --db-host=db --db-port=3306 --db-name=taskdb --db-user=mywebapp --db-password=mysecretpassword"
    networks:
      - app_network
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: task_nginx
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app_network
    depends_on:
      - webapp

networks:
  app_network:
    driver: bridge

volumes:
  db_data:
